services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sumaya
      POSTGRES_PASSWORD: sumaya_secret
      POSTGRES_DB: sumaya_resto
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sumaya -d sumaya_resto"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sumaya:sumaya_secret@postgres:5432/sumaya_resto
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: sumaya-dev-secret-change-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
