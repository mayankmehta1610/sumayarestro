# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect mayankmehta1610/sumayarestro
#
# Laptop PostgreSQL (interim):
#   1. docker compose up -d postgres
#   2. .\scripts\deploy-all.ps1
#   3. Paste printed DATABASE_URL into sumaya-api env on Render

services:
  - type: web
    name: sumaya-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://sumaya-web.onrender.com
      - key: REDIS_URL
        value: ""

  - type: web
    name: sumaya-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://sumaya-api.onrender.com/api/v1
