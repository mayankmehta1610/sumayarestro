# Render Blueprint — https://render.com/docs/blueprint-spec
# Repo: github.com/mayankmehta1610/sumayarestro

services:
  - type: web
    name: sumaya-api
    runtime: docker
    region: oregon
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DB_SCHEMA
        value: sumaya_resto
      - key: CORS_ORIGINS
        value: https://sumaya-web.onrender.com

  - type: web
    name: sumaya-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://sumaya-api.onrender.com/api/v1
