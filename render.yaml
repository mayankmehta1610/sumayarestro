# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect repo → Render auto-detects this file
#
# BEFORE FIRST DEPLOY:
# 1. Start local Postgres: docker compose up -d postgres
# 2. Start tunnel: .\scripts\tunnel-postgres.ps1  (copy public host:port to DATABASE_URL)
# 3. In Render Dashboard set DATABASE_URL manually (see DEPLOY.md)

services:
  # FastAPI Backend
  - type: web
    name: sumaya-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  # React Web (Vite static site)
  - type: web
    name: sumaya-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
