# Cloudflare Tunnel — TCP expose for local PostgreSQL
# Copy to config.yml and fill in your tunnel UUID from: cloudflared tunnel create sumaya-pg
#
# Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/

tunnel: YOUR_TUNNEL_UUID
credentials-file: C:\Users\YOUR_USER\.cloudflared\YOUR_TUNNEL_UUID.json

ingress:
  - hostname: pg-sumaya.yourdomain.com
    service: tcp://localhost:5433
  - service: http_status:404
